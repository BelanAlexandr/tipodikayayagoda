version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy 
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_CONN_STR: ${DB_CONN_STR}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      ACCES_KEY: ${ACCES_KEY}      
      SECRET_ACCES_KEY: ${SECRET_ACCES_KEY}
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 5

  minio: 
    image: minio/minio
    restart: always
    ports:
      - "9000:9000" 
      - "9001:9001" 
    environment:
      MINIO_ROOT_USER: ${ACCES_KEY}
      MINIO_ROOT_PASSWORD: ${SECRET_ACCES_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  minio_data: